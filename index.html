<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sara — A Personal Universe</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,700&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Lato:wght@300;400&display=swap" rel="stylesheet">

<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --cream: #FDF8F2;
    --warm-white: #FFF9F4;
    --gold: #C4895A;
    --gold-light: #E2B98A;
    --gold-pale: #F0D9C0;
    --brown-deep: #3D2B1F;
    --brown-mid: #7A5C47;
    --brown-soft: #A07860;
    --rose: #D4876A;
  }

  html, body {
    height: 100%;
    background: var(--cream);
    font-family: 'Lato', sans-serif;
    overflow-x: hidden;
  }

  /* ── Background texture ── */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      radial-gradient(ellipse 80% 60% at 20% 20%, rgba(212,165,116,0.10) 0%, transparent 60%),
      radial-gradient(ellipse 60% 80% at 80% 80%, rgba(196,137,90,0.08) 0%, transparent 60%);
    pointer-events: none;
    z-index: 0;
  }

  /* ── Stars ── */
  .stars {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
  }

  .star {
    position: absolute;
    border-radius: 50%;
    background: var(--gold-light);
    animation: twinkle var(--dur, 3s) ease-in-out infinite alternate;
  }

  @keyframes twinkle {
    from { opacity: 0.08; transform: scale(0.7); }
    to   { opacity: 0.45; transform: scale(1.3); }
  }

  /* ── Page layout ── */
  .page {
    position: relative;
    z-index: 1;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 60px 24px 80px;
  }

  /* ── Top subtitle ── */
  .subtitle-top {
    font-family: 'Cormorant Garamond', serif;
    font-size: 12px;
    font-weight: 300;
    font-style: italic;
    letter-spacing: 0.4em;
    color: var(--brown-soft);
    text-transform: uppercase;
    margin-bottom: 52px;
    opacity: 0;
    animation: fadeUp 1s ease forwards 0.3s;
  }

  .ornament {
    display: inline-block;
    color: var(--gold-light);
    margin: 0 10px;
    font-style: normal;
    opacity: 0.7;
  }

  /* ── Letters row ── */
  .letters-row {
    display: flex;
    align-items: flex-end;
    gap: 2px;
    margin-bottom: 44px;
  }

  .letter-wrap {
    position: relative;
    cursor: pointer;
    opacity: 0;
    animation: fadeUp 0.7s ease forwards;
  }

  .letter-wrap:nth-child(1) { animation-delay: 0.5s; }
  .letter-wrap:nth-child(2) { animation-delay: 0.68s; }
  .letter-wrap:nth-child(3) { animation-delay: 0.86s; }
  .letter-wrap:nth-child(4) { animation-delay: 1.04s; }

  .letter {
    display: block;
    font-family: 'Playfair Display', serif;
    font-size: clamp(80px, 16vw, 140px);
    font-weight: 700;
    font-style: italic;
    color: var(--brown-deep);
    line-height: 0.9;
    padding: 0 6px;
    transition:
      color 0.35s ease,
      transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    user-select: none;
  }

  .letter-wrap:hover .letter {
    color: var(--gold);
    transform: translateY(-10px) rotate(-3deg);
  }

  .letter-wrap.active .letter {
    color: var(--gold);
    transform: translateY(-7px) rotate(-1.5deg);
  }

  /* glow dot */
  .dot {
    width: 4px;
    height: 4px;
    border-radius: 50%;
    background: var(--gold);
    position: absolute;
    bottom: -12px;
    left: 50%;
    transform: translateX(-50%) scale(0);
    transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1), opacity 0.3s;
    opacity: 0;
  }

  .letter-wrap:hover .dot,
  .letter-wrap.active .dot {
    transform: translateX(-50%) scale(1);
    opacity: 1;
  }

  /* ── Tagline ── */
  .tagline {
    font-family: 'Cormorant Garamond', serif;
    font-size: 17px;
    font-weight: 300;
    font-style: italic;
    color: var(--brown-mid);
    text-align: center;
    max-width: 400px;
    line-height: 1.75;
    letter-spacing: 0.01em;
    opacity: 0;
    animation: fadeUp 1s ease forwards 1.5s;
  }

  /* ── Divider ── */
  .divider {
    width: 50px;
    height: 1px;
    background: linear-gradient(to right, transparent, var(--gold-light), transparent);
    margin: 40px auto;
    opacity: 0;
    animation: fadeUp 1s ease forwards 1.7s;
  }

  /* ── Panel ── */
  .panel-container {
    width: 100%;
    max-width: 560px;
    transition: opacity 0.4s ease;
  }

  .panel-container.hidden {
    opacity: 0;
    pointer-events: none;
  }

  .panel {
    background: rgba(255, 252, 247, 0.97);
    border: 1px solid rgba(196, 137, 90, 0.2);
    border-radius: 24px;
    padding: 40px 44px;
    text-align: center;
    position: relative;
    box-shadow:
      0 4px 24px rgba(61, 43, 31, 0.06),
      0 1px 3px rgba(196, 137, 90, 0.08);
    animation: panelIn 0.5s cubic-bezier(0.34, 1.3, 0.64, 1) forwards;
  }

  @keyframes panelIn {
    from { opacity: 0; transform: translateY(16px) scale(0.97); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }

  .panel::before {
    content: '';
    position: absolute;
    top: -1px; left: 40px; right: 40px;
    height: 2px;
    background: linear-gradient(to right, transparent, var(--gold-light), transparent);
    border-radius: 0 0 2px 2px;
  }

  .panel-eyebrow {
    font-family: 'Cormorant Garamond', serif;
    font-size: 11px;
    font-weight: 400;
    color: var(--gold);
    letter-spacing: 0.45em;
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  .panel-title {
    font-family: 'Playfair Display', serif;
    font-size: 32px;
    font-weight: 700;
    font-style: italic;
    color: var(--brown-deep);
    margin-bottom: 6px;
  }

  .panel-chinese {
    font-family: 'Cormorant Garamond', serif;
    font-size: 14px;
    font-weight: 300;
    color: var(--gold);
    letter-spacing: 0.25em;
    margin-bottom: 20px;
  }

  .panel-rule {
    width: 32px;
    height: 1px;
    background: var(--gold-pale);
    margin: 0 auto 20px;
  }

  .panel-desc {
    font-family: 'Cormorant Garamond', serif;
    font-size: 19px;
    font-weight: 300;
    font-style: italic;
    color: var(--brown-mid);
    line-height: 1.8;
  }

  .panel-close {
    position: absolute;
    top: 18px; right: 22px;
    width: 30px; height: 30px;
    border: none;
    background: none;
    cursor: pointer;
    color: var(--brown-soft);
    font-size: 20px;
    font-family: 'Playfair Display', serif;
    display: flex; align-items: center; justify-content: center;
    border-radius: 50%;
    transition: background 0.2s, color 0.2s;
    line-height: 1;
  }

  .panel-close:hover {
    background: rgba(196, 137, 90, 0.12);
    color: var(--gold);
  }

  /* ── Hint ── */
  .hint {
    font-family: 'Cormorant Garamond', serif;
    font-size: 13px;
    font-weight: 300;
    font-style: italic;
    color: var(--gold-light);
    letter-spacing: 0.1em;
    opacity: 0;
    animation: fadeUp 1s ease forwards 2s;
    margin-top: 16px;
    transition: opacity 0.4s;
  }

  .hint.hidden { opacity: 0 !important; }

  /* ── Keyframes ── */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(18px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ── Responsive ── */
  @media (max-width: 480px) {
    .panel { padding: 32px 24px; }
    .panel-desc { font-size: 16px; }
  }
</style>
</head>
<body>

<div class="stars" id="stars"></div>

<div class="page">

  <p class="subtitle-top">
    <span class="ornament">✦</span> A personal universe by Sara Wu <span class="ornament">✦</span>
  </p>

  <div class="letters-row" id="lettersRow">
    <div class="letter-wrap" data-index="0">
      <span class="letter">S</span>
      <div class="dot"></div>
    </div>
    <div class="letter-wrap" data-index="1">
      <span class="letter">A</span>
      <div class="dot"></div>
    </div>
    <div class="letter-wrap" data-index="2">
      <span class="letter">R</span>
      <div class="dot"></div>
    </div>
    <div class="letter-wrap" data-index="3">
      <span class="letter">A</span>
      <div class="dot"></div>
    </div>
  </div>

  <p class="tagline">Mapping the world through thought, aesthetics, and curiosity.</p>

  <div class="divider"></div>

  <div class="panel-container hidden" id="panelContainer">
    <div class="panel" id="panel">
      <button class="panel-close" id="closeBtn" aria-label="close">×</button>
      <div class="panel-eyebrow" id="panelEyebrow"></div>
      <div class="panel-title" id="panelTitle"></div>
      <div class="panel-chinese" id="panelChinese"></div>
      <div class="panel-rule"></div>
      <div class="panel-desc" id="panelDesc"></div>
    </div>
  </div>

  <p class="hint" id="hint">tap a letter to explore ↑</p>

</div>

<script>
  /* ── Stars ── */
  const starContainer = document.getElementById('stars');
  for (let i = 0; i < 30; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    const size = Math.random() * 3.5 + 1.5;
    s.style.cssText = `
      width:${size}px; height:${size}px;
      top:${Math.random() * 100}%;
      left:${Math.random() * 100}%;
      --dur:${2 + Math.random() * 4}s;
      animation-delay:${Math.random() * 5}s;
    `;
    starContainer.appendChild(s);
  }

  /* ── Data ── */
  const data = [
   {
  eyebrow: 'S — Self',
  title: 'Who I am',
  chinese: '存在',
  desc: 'Not a fixed identity, but a moving system. An ongoing attempt to understand who I am becoming.'
   },
   {
     eyebrow: 'A — AI',
     title: 'What I build',
     chinese: '创造',
     desc: 'Building small intelligent systems. Projects, experiments, and the realities behind making them work.'
   },
   {
     eyebrow: 'R — Reflection',
     title: 'What I write',
     chinese: '表达',
     desc: 'Writing as a way of thinking. Fragments, notes, and moments of partial clarity.'
   },
   {
     eyebrow: 'A — Aesthetics',
     title: 'What I see',
     chinese: '感受',
     desc: 'A way of seeing, not just creating. Images, spaces, and the quiet language of beauty.'
   }
  ];

  /* ── Panel logic ── */
  const panelContainer = document.getElementById('panelContainer');
  const panelEyebrow   = document.getElementById('panelEyebrow');
  const panelTitle     = document.getElementById('panelTitle');
  const panelChinese   = document.getElementById('panelChinese');
  const panelDesc      = document.getElementById('panelDesc');
  const panel          = document.getElementById('panel');
  const hint           = document.getElementById('hint');
  const closeBtn       = document.getElementById('closeBtn');
  let active = null;

  function showPanel(i) {
    const d = data[i];
    panelEyebrow.textContent = d.eyebrow;
    panelTitle.textContent   = d.title;
    panelChinese.textContent = d.chinese;
    panelDesc.textContent    = d.desc;

    panelContainer.classList.remove('hidden');
    // re-trigger animation
    panel.style.animation = 'none';
    panel.offsetHeight;
    panel.style.animation = '';

    hint.classList.add('hidden');
  }

  function hidePanel() {
    panelContainer.classList.add('hidden');
    hint.classList.remove('hidden');
    if (active !== null) {
      document.querySelectorAll('.letter-wrap')[active].classList.remove('active');
      active = null;
    }
  }

  document.querySelectorAll('.letter-wrap').forEach((el, i) => {
    el.addEventListener('click', () => {
      if (active === i) {
        hidePanel();
        return;
      }
      if (active !== null) {
        document.querySelectorAll('.letter-wrap')[active].classList.remove('active');
      }
      el.classList.add('active');
      active = i;
      showPanel(i);
    });
  });

  closeBtn.addEventListener('click', hidePanel);
</script>
</body>
</html>
